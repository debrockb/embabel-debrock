## Cloud profile — activates when SPRING_PROFILES_ACTIVE includes 'cloud'.
## Re-enables Embabel's cloud LLM provider autoconfigs (Anthropic, OpenAI,
## OpenRouter). Requires the corresponding API keys to be set.
##
## Usage:
##   SPRING_PROFILES_ACTIVE=cloud                    (local dev with cloud keys)
##   SPRING_PROFILES_ACTIVE=docker,cloud              (NAS with cloud keys)
##
## Overrides the base application.yml exclusion list.
spring:
  autoconfigure:
    exclude: []
