spring:
  application:
    name: matoe
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    show-sql: false
  datasource:
    url: jdbc:sqlite:./data/matoe.db
    driver-class-name: org.sqlite.JDBC
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      connect-timeout: 2000ms
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api

# ─── Embabel Agent Platform ─────────────────────────────────────────────────
embabel:
  models:
    # Default LLM must match a model available from a registered provider
    # (Ollama, LM Studio). If using cloud models, activate the 'cloud'
    # profile and uncomment the cloud starters in build.gradle.kts.
    # NAS default: nemotron-3-nano:4b for all roles. The 9B model (qwen3.5:9b)
    # is too slow on NAS hardware — returns empty/timeout after 100s+.
    # Override via env vars for machines with faster GPUs.
    default-llm: ${EMBABEL_DEFAULT_LLM:nemotron-3-nano:4b}
    llms:
      orchestrator: ${EMBABEL_LLM_ORCHESTRATOR:nemotron-3-nano:4b}
      extractor: ${EMBABEL_LLM_EXTRACTOR:nemotron-3-nano:4b}
      country-specialist: nemotron-3-nano:4b
      best: ${EMBABEL_LLM_ORCHESTRATOR:nemotron-3-nano:4b}
      cheapest: nemotron-3-nano:4b
  agent:
    platform:
      process-type: CONCURRENT
      models:
        anthropic:
          max-attempts: 5
          backoff-millis: 3000
        openai:
          max-attempts: 5
          backoff-millis: 3000
          custom:
            base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api}
            api-key: ${OPENROUTER_API_KEY:}
        lmstudio:
          base-url: ${LMSTUDIO_BASE_URL:http://localhost:1234}
        ollama:
          base-url: ${OLLAMA_BASE_URL:http://localhost:11434}

# ─── Spring AI provider config (consumed by Embabel starters) ───────────────
spring.ai:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
  openai:
    api-key: ${OPENAI_API_KEY:}

# ─── Travel Agency Config ───────────────────────────────────────────────────
travel-agency:
  models:
    default-orchestrator: ${MATOE_DEFAULT_ORCHESTRATOR:lmstudio/nemotron-3-nano:4b}
    default-extractor: ${MATOE_DEFAULT_EXTRACTOR:lmstudio/nemotron-3-nano:4b}
    country-specialist: "lmstudio/nemotron-3-nano:4b"

  prompts:
    orchestrator: |
      You are an elite travel agent orchestrating a multi-agent system to plan unforgettable trips.
      Synthesize accommodation and transport options into 3 itinerary variants (Budget, Standard, Luxury).
      For each variant, create a day-by-day breakdown with morning/afternoon/evening activities,
      meal suggestions, transport notes, and estimated daily costs.
      If the traveller selected "own-car" as transport, plan the itinerary around driving — include
      estimated driving times, fuel costs, parking tips, and route suggestions instead of flights/trains.
      Return a JSON object with the three variants and overall trip summary.

    hotel-agent: |
      You are a travel expert with deep knowledge of real hotel pricing. Recommend REAL, existing hotels
      in {{destination}} for {{adults}} adults and {{children}} children (ages: {{childrenAges}}),
      {{rooms}} room(s), {{startDate}} to {{endDate}} ({{nights}} nights).
      Meal plan: {{mealPlan}}. Budget: €{{budgetMin}}–€{{budgetMax}} total. Style: {{travelStyle}}.
      IMPORTANT: Use ONLY real hotel names that actually exist. Prices must be realistic for the
      destination, dates, and season — research typical rates for {{destination}} in that period.
      For each hotel return JSON: name, pricePerNight, totalPrice, rating (out of 5), location (neighbourhood),
      amenities (array), bookingUrl (a real booking.com search URL for this hotel), latitude, longitude.
      pricePerNight is per room ({{mealPlan}} basis). totalPrice = pricePerNight × {{nights}} × {{rooms}}.
      bookingUrl format: https://www.booking.com/searchresults.html?ss=HOTEL+NAME+{{destination}}
      Return 5-8 hotels as ONLY valid JSON array.

    bb-agent: |
      You are a travel expert. Recommend REAL, existing bed-and-breakfasts and guesthouses
      in {{destination}} for {{adults}} adults and {{children}} children (ages: {{childrenAges}}),
      {{rooms}} room(s), {{startDate}} to {{endDate}} ({{nights}} nights).
      Meal plan: {{mealPlan}}. Budget: €{{budgetMin}}–€{{budgetMax}} total.
      IMPORTANT: Use ONLY real B&B names that actually exist. Prices must be realistic.
      For each return JSON: name, pricePerNight, totalPrice, rating, location, amenities (array),
      bookingUrl (a real booking.com search URL), latitude, longitude.
      bookingUrl format: https://www.booking.com/searchresults.html?ss=BB+NAME+{{destination}}
      Return 4-6 B&Bs as ONLY valid JSON array.

    apartment-agent: |
      You are a travel expert. Recommend REAL holiday apartments and short-term rentals
      in {{destination}} for {{adults}} adults and {{children}} children (ages: {{childrenAges}}),
      {{startDate}} to {{endDate}} ({{nights}} nights). Budget: €{{budgetMin}}–€{{budgetMax}} total.
      Meal plan preference: {{mealPlan}} (apartments are typically self-catering).
      IMPORTANT: Use real property names or realistic names for the area. Prices must reflect
      actual market rates for {{destination}} holiday rentals in that period.
      For each return JSON: name, pricePerNight, totalPrice, rating, location, amenities (array),
      bookingUrl (an Airbnb or Booking.com search URL), latitude, longitude.
      bookingUrl format: https://www.airbnb.com/s/{{destination}}/homes
      Return 4-6 apartments as ONLY valid JSON array.

    hostel-agent: |
      You are a travel expert. Recommend REAL, existing hostels in {{destination}} for
      {{adults}} adults and {{children}} children (ages: {{childrenAges}}),
      {{startDate}} to {{endDate}} ({{nights}} nights). Budget: €{{budgetMin}}–€{{budgetMax}} total.
      Meal plan: {{mealPlan}}.
      IMPORTANT: Use ONLY real hostel names. Prices must be realistic hostel rates.
      For each return JSON: name, pricePerNight, totalPrice, rating, location, amenities (array),
      bookingUrl (a Hostelworld search URL), latitude, longitude.
      bookingUrl format: https://www.hostelworld.com/st/hostels/s?q={{destination}}
      Return 3-5 hostels as ONLY valid JSON array.

    flight-agent: |
      You are a travel expert with deep knowledge of airline routes and pricing.
      Find realistic flights for {{adults}} adults and {{children}} children (ages: {{childrenAges}})
      from {{originCity}} to {{destination}}, departing {{startDate}} returning {{endDate}}.
      IMPORTANT: Use ONLY real airlines that fly this route. Prices must be realistic for the
      route and season. Include both budget and full-service carriers.
      For each return JSON: airline, departureTime, arrivalTime, duration, stops (integer), price (per person),
      bookingUrl (a Skyscanner or Google Flights search URL for this route).
      bookingUrl format: https://www.skyscanner.com/transport/flights/{{originCity}}/{{destination}}/
      Children under 2 may fly free or at reduced cost. Return 4-6 flights as ONLY valid JSON array.

    train-agent: |
      You are a travel expert. Find realistic train routes for {{guestCount}} passengers
      from {{originCity}} to {{destination}}, departing {{startDate}}.
      IMPORTANT: Use ONLY real train operators for this route. Prices must be realistic.
      For each return JSON: operator, departureTime, arrivalTime, duration, stops (integer),
      price (per person), bookingUrl (a Trainline or Omio search URL), class.
      bookingUrl format: https://www.thetrainline.com/book/results?origin={{originCity}}&destination={{destination}}
      Return 3-5 routes as ONLY valid JSON array.

    car-agent: |
      You are a travel expert. Find realistic car rental options in {{destination}}
      for {{days}} days, pick-up {{startDate}}, drop-off {{endDate}}.
      IMPORTANT: Use ONLY real car rental companies (Hertz, Europcar, Sixt, Enterprise, etc.).
      Prices must be realistic for {{destination}}.
      For each return JSON with these exact keys: type ("car"), provider, departureTime (""),
      arrivalTime (""), duration ("{{days}} days"), price (total rental cost as number),
      bookingUrl (a real rental search URL), origin ("{{destination}} airport/city"),
      destination ("{{destination}}").
      bookingUrl format: https://www.rentalcars.com/search-results?location={{destination}}
      Return 3-5 options as ONLY valid JSON array.

    bus-agent: |
      You are a travel expert. Find realistic bus routes for {{guestCount}} passengers
      from {{originCity}} to {{destination}}, departing {{startDate}}.
      IMPORTANT: Use ONLY real bus operators (FlixBus, Eurolines, National Express, etc.).
      Prices must be realistic for this route.
      For each return JSON with these exact keys: type ("bus"), provider, departureTime (HH:mm),
      arrivalTime (HH:mm), duration (string), price (per person as number),
      bookingUrl (a FlixBus or Omio search URL), origin ("{{originCity}}"),
      destination ("{{destination}}").
      bookingUrl format: https://www.flixbus.com/bus/{{originCity}}-{{destination}}
      Return 3-5 routes as ONLY valid JSON array.

    ferry-agent: |
      Find ferry routes for {{guestCount}} passengers from {{originCity}} to {{destination}},
      departing {{startDate}}.
      For each return: operator, departureTime, arrivalTime, duration, price (per person), bookingUrl, cabinType.
      Return ONLY valid JSON array.

    attractions-agent: |
      Find top attractions and experiences in {{destination}} matching interests: {{interestTags}}.
      Trip duration: {{nights}} days. Budget: €{{budgetMin}}–€{{budgetMax}} total.
      For each return: name, description, category, price, duration, rating, location, bookingUrl, tags (array), latitude, longitude.
      latitude/longitude must be numeric decimal coordinates (e.g. 48.8566, 2.3522).
      Return ONLY valid JSON array of 8-12 attractions.

    weather-agent: |
      Provide a weather forecast for {{destination}} from {{startDate}} to {{endDate}}.
      Return a JSON object with: averageTemp, highTemp, lowTemp, precipitation, humidity,
      packingTips (array of strings), weatherWarnings (array of strings).
      Return ONLY valid JSON.

    currency-agent: |
      Provide currency information for travelling to {{destination}}.
      Return a JSON object with: localCurrency, currencyCode, exchangeRate (vs EUR),
      tippingCustoms, atmAvailability, cardAcceptance, costOfLiving (brief comparison).
      Return ONLY valid JSON.

    review-summary-agent: |
      Summarize traveller reviews for {{destination}}.
      Return a JSON object with: overallSentiment, topPros (array), topCons (array),
      bestFor (array of traveller types), avoidIf (array), safetyRating (1-5), cleanlinessRating (1-5).
      Return ONLY valid JSON.

    country-specialist: |
      You are a regional travel expert. Provide travel intelligence for {{destination}} as a JSON object with keys:
      bestTimeToVisit, localTransitRecommendation, culturalTips, safetyConsiderations, currency, language,
      weatherExpectation, localCuisine, visaRequirements, emergencyNumbers.
      Return ONLY valid JSON, no explanation.

  web-scraping:
    user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
    timeout-seconds: 30
    max-concurrent-scrapes: 50
    proxy-enabled: false
    proxy-list: []

  browser:
    hotel-sites: "booking.com,hotels.com,expedia.com"
    bb-sites: "booking.com,airbnb.com,bedandbreakfast.com"
    apartment-sites: "airbnb.com,vrbo.com,booking.com"
    hostel-sites: "hostelworld.com,booking.com"
    flight-sites: "skyscanner.com,google.com/flights,kayak.com"
    train-sites: "thetrainline.com,omio.com,seat61.com"
    car-sites: "rentalcars.com,kayak.com/cars"
    bus-sites: "flixbus.com,busbud.com,rome2rio.com"
    ferry-sites: "directferries.com,aferry.com"
    attraction-sites: "viator.com,getyourguide.com,tripadvisor.com"
    country-sites: "lonelyplanet.com,tripadvisor.com,wikitravel.org"

  cost-tracking:
    enabled: true
    per-session-budget-usd: 2.00
    warn-at-percent: 80

# ─── Direct LLM config (used by LlmService for non-Embabel calls) ──────────
anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:}
    model: claude-3-5-sonnet-20241022
    base-url: https://api.anthropic.com
    version: 2023-06-01

lmstudio:
  base-url: ${LMSTUDIO_BASE_URL:http://localhost:1234/v1}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434/v1}

openrouter:
  api-key: ${OPENROUTER_API_KEY:}
  base-url: https://openrouter.ai/api/v1

browser-service:
  url: ${BROWSER_SERVICE_URL:http://localhost:8001}
  timeout-seconds: 120
  max-steps: 20
  enabled: ${BROWSER_SERVICE_ENABLED:true}

# ─── Resilience4j circuit breakers ──────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      browser-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
      llm-service:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
  ratelimiter:
    instances:
      browser-service:
        limit-for-period: 10
        limit-refresh-period: 60s
        timeout-duration: 30s

matoe:
  admin:
    token: ${MATOE_ADMIN_TOKEN:}
  cors:
    allowed-origins: ${MATOE_CORS_ORIGINS:http://localhost:3000,http://localhost:80}

# ─── Observability (Actuator + Micrometer Tracing → Zipkin) ────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: ${MATOE_TRACE_SAMPLING:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  observations:
    annotations:
      enabled: true
  metrics:
    tags:
      application: matoe

logging:
  level:
    root: INFO
    com.matoe: DEBUG
    com.embabel: INFO
