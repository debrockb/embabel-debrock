spring:
  application:
    name: matoe-test
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    show-sql: false
  datasource:
    url: "jdbc:sqlite::memory:"
    driver-class-name: org.sqlite.JDBC
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 100ms
      connect-timeout: 100ms
  cache:
    type: simple
  flyway:
    enabled: false

server:
  port: 0
  servlet:
    context-path: /api

embabel:
  models:
    default-llm: qwen3.5:9b
    llms:
      orchestrator: qwen3.5:9b
      extractor: nemotron-3-nano:4b
      country-specialist: nemotron-3-nano:4b
      best: qwen3.5:9b
      cheapest: nemotron-3-nano:4b
  agent:
    platform:
      process-type: CONCURRENT
      models:
        anthropic:
          max-attempts: 1
          backoff-millis: 100

spring.ai:
  anthropic:
    api-key: test-key
  openai:
    api-key: test-key

travel-agency:
  models:
    default-orchestrator: "lmstudio/qwen3.5:9b"
    default-extractor: "lmstudio/nemotron-3-nano:4b"
    country-specialist: "lmstudio/nemotron-3-nano:4b"

  prompts:
    orchestrator: "Test orchestrator prompt"
    hotel-agent: "Find hotels in {{destination}} for {{guestCount}} guests, {{nights}} nights."
    bb-agent: "Find B&Bs in {{destination}} for {{guestCount}} guests."
    apartment-agent: "Find apartments in {{destination}} for {{guestCount}} guests."
    hostel-agent: "Find hostels in {{destination}}."
    flight-agent: "Find flights from {{originCity}} to {{destination}} for {{guestCount}} passengers."
    train-agent: "Find trains."
    car-agent: "Find car rentals."
    bus-agent: "Find bus routes."
    ferry-agent: "Find ferries."
    attractions-agent: "Find attractions in {{destination}}."
    weather-agent: "Weather for {{destination}}."
    currency-agent: "Currency for {{destination}}."
    review-summary-agent: "Reviews for {{destination}}."
    country-specialist: "Regional travel expert for {{destination}}."

  web-scraping:
    user-agent: "Test-Agent"
    timeout-seconds: 5
    max-concurrent-scrapes: 2
    proxy-enabled: false
    proxy-list: []

  browser:
    hotel-sites: "booking.com"
    bb-sites: "booking.com"
    apartment-sites: "airbnb.com"
    hostel-sites: "hostelworld.com"
    flight-sites: "skyscanner.com"
    train-sites: "thetrainline.com"
    car-sites: "rentalcars.com"
    bus-sites: "flixbus.com"
    ferry-sites: "directferries.com"
    attraction-sites: "viator.com"
    country-sites: "lonelyplanet.com"

  cost-tracking:
    enabled: true
    per-session-budget-usd: 2.00
    warn-at-percent: 80

anthropic:
  api:
    key: test-key
    model: claude-3-5-sonnet-20241022
    base-url: https://api.anthropic.com
    version: 2023-06-01

lmstudio:
  base-url: http://localhost:1234/v1

ollama:
  base-url: http://localhost:11434/v1

openrouter:
  api-key: test-key
  base-url: https://openrouter.ai/api/v1

browser-service:
  url: http://localhost:8001
  timeout-seconds: 5
  max-steps: 5
  enabled: false

management:
  tracing:
    enabled: false

# Exclude Embabel auto-configurations in tests — ConfigurableModelProvider
# validates that configured LLMs are reachable, which fails in CI (no Ollama /
# LM Studio running).  EmbabelLazyInitConfig handles this at runtime, but
# EnvironmentPostProcessor + eager auto-config beans bypass lazy-init.
spring.autoconfigure.exclude:
  - com.embabel.agent.autoconfigure.platform.AgentPlatformAutoConfiguration
  - com.embabel.agent.autoconfigure.models.ollama.AgentOllamaAutoConfiguration
  - com.embabel.agent.autoconfigure.models.lmstudio.AgentLmStudioAutoConfiguration
  - com.embabel.agent.autoconfigure.models.openai.AgentOpenAiAutoConfiguration
  - com.embabel.agent.autoconfigure.models.anthropic.AgentAnthropicAutoConfiguration
  - com.embabel.agent.autoconfigure.models.openai.custom.AgentOpenAiCustomAutoConfiguration
  - com.embabel.agent.autoconfigure.observability.OpenTelemetrySdkAutoConfiguration
  - com.embabel.agent.autoconfigure.observability.MicrometerTracingAutoConfiguration
  - com.embabel.agent.autoconfigure.observability.ObservabilityAutoConfiguration
  - com.embabel.agent.autoconfigure.observability.TrackedAspectAutoConfiguration

logging:
  level:
    root: WARN
    com.matoe: DEBUG
