name: Publish Images

# Build and push the backend, frontend, and browser-service images to GHCR
# so the Portainer/NAS stack in docker-compose.portainer.yml can pull them
# without needing a git clone on the NAS host.
#
# Triggers:
#   - push to main (publishes :latest and :sha-xxxxxxx)
#   - tag push vX.Y.Z (publishes :X.Y.Z)
#   - manual dispatch
#
# fail-fast: false allows all three images to attempt building even if one
# fails, but the overall workflow still reports failure if any image breaks.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: backend
            context: .
            dockerfile: Dockerfile
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
          - name: browser
            context: browser_service
            dockerfile: browser_service/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (ARM64 cross-compilation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase owner
        id: owner
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.lc }}/matoe-${{ matrix.image.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=M.A.T.O.E ${{ matrix.image.name }} image
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
