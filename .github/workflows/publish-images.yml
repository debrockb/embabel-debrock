name: Publish Images

# Build and push multi-arch Docker images (backend, frontend, browser) to the
# GitHub Container Registry (GHCR). This is what makes the NAS/Portainer stack
# deployable without a repo checkout — docker-compose.portainer.yml references
# the images published here.
#
# Triggers:
#   - push to main (tags pushed as :latest + :sha-<shortsha>)
#   - git tag v* (tags pushed as :latest + :<version>)
#   - manual (workflow_dispatch) for ad-hoc rebuilds
#
# The images are multi-arch (amd64 + arm64) so the same stack works on a
# Synology/QNAP ARM NAS and on x86 servers without changes.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/embabel-debrock

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: .
            dockerfile: Dockerfile
          - service: frontend
            context: ./frontend
            dockerfile: Dockerfile
          - service: browser
            context: ./browser_service
            dockerfile: Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
