## ═══════════════════════════════════════════════════════════════════════════════
## M.A.T.O.E — NAS / Portainer Deployment (prebuilt-image stack)
## ═══════════════════════════════════════════════════════════════════════════════
## Deploy via Portainer → Stacks → Add Stack → Web editor (paste this file).
## No source checkout required — images pulled from GHCR.
##
## Images used (multi-arch, built by .github/workflows/publish-images.yml):
##   ghcr.io/debrockb/matoe-backend:${MATOE_IMAGE_TAG:-latest}
##   ghcr.io/debrockb/matoe-frontend:${MATOE_IMAGE_TAG:-latest}
##   ghcr.io/debrockb/matoe-browser:${MATOE_IMAGE_TAG:-latest}
##
## ────────────────────────────────────────────────────────────────────────────
## GHCR PACKAGE VISIBILITY (one-time, per package)
## ────────────────────────────────────────────────────────────────────────────
## After the first successful workflow run, the three packages are created
## under github.com/users/debrockb/packages/container/matoe-{backend,frontend,browser}
## in *Private* visibility. The NAS will not be able to `docker pull` them
## anonymously until each is flipped to *Public*:
##
##   1. Open https://github.com/debrockb?tab=packages
##   2. Click each of the three matoe-* packages
##   3. Package settings → "Change visibility" → Public
##
## Alternatively, keep them private and provide registry credentials to
## Portainer: Registries → Add registry → ghcr.io with a GitHub PAT that has
## `read:packages` scope. Images will then be pulled with those credentials.
##
## REQUIRED environment variables (set in Portainer Stack settings):
##   MATOE_ADMIN_TOKEN   — admin API auth (REQUIRED in production; the backend
##                         will refuse to start if unset while profile=docker)
##
## Optional (for cloud LLMs):
##   ANTHROPIC_API_KEY, OPENROUTER_API_KEY, OPENAI_API_KEY
##
## For local LLMs on the NAS LAN:
##   LMSTUDIO_BASE_URL=http://192.168.1.100:1234/v1
##   OLLAMA_BASE_URL=http://192.168.1.100:11434
##
## Security notes:
##   • Backend port (8080) is NOT published to the host. All traffic goes
##     through the frontend (port 3080) which reverse-proxies /api → backend.
##   • PostgreSQL and Redis stay on the internal matoe-network.
##   • MATOE_CORS_ORIGINS defaults to the internal frontend origin only.
## ═══════════════════════════════════════════════════════════════════════════════

services:

  backend:
    image: ghcr.io/debrockb/matoe-backend:${MATOE_IMAGE_TAG:-latest}
    # Fallback to source build if images are not published yet:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: MATOE-Backend
    # Backend is intentionally NOT exposed to the host — frontend proxies /api.
    # Uncomment only if you need direct access for debugging:
    # ports:
    #   - "8085:8080"
    expose:
      - "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://matoe-postgres:5432/matoe
      SPRING_DATASOURCE_USERNAME: matoe_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-matoe_password}
      JAVA_TOOL_OPTIONS: "-XX:+UseZGC -XX:ZCollectionInterval=120 -Xmx2G -Xms1G --enable-preview"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LMSTUDIO_BASE_URL: ${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      BROWSER_SERVICE_URL: http://matoe-browser-lb:80
      BROWSER_SERVICE_ENABLED: ${BROWSER_SERVICE_ENABLED:-true}
      REDIS_HOST: matoe-redis
      ZIPKIN_ENDPOINT: http://matoe-zipkin:9411/api/v2/spans
      MATOE_TRACE_SAMPLING: ${MATOE_TRACE_SAMPLING:-0.1}
      # Admin token is required in production — backend will refuse to start if unset.
      MATOE_ADMIN_TOKEN: ${MATOE_ADMIN_TOKEN:?MATOE_ADMIN_TOKEN must be set in Portainer Stack env}
      # Default CORS locked to the internal frontend origin only.
      MATOE_CORS_ORIGINS: ${MATOE_CORS_ORIGINS:-http://localhost:3080}
    depends_on:
      matoe-postgres:
        condition: service_healthy
      matoe-redis:
        condition: service_started
      matoe-browser-lb:
        condition: service_started
      matoe-zipkin:
        condition: service_started
    networks:
      - matoe-network
    volumes:
      - matoe_app_data:/app/data
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    restart: unless-stopped

  frontend:
    image: ghcr.io/debrockb/matoe-frontend:${MATOE_IMAGE_TAG:-latest}
    # Fallback to source build:
    # build:
    #   context: ./frontend
    #   dockerfile: Dockerfile
    container_name: MATOE-Frontend
    ports:
      - "${MATOE_FRONTEND_PORT:-3080}:80"
    depends_on:
      - backend
    networks:
      - matoe-network
    restart: unless-stopped

  browser-1:
    image: ghcr.io/debrockb/matoe-browser:${MATOE_IMAGE_TAG:-latest}
    # build:
    #   context: ./browser_service
    #   dockerfile: Dockerfile
    container_name: MATOE-Browser-1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LMSTUDIO_BASE_URL: ${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      DEFAULT_MODEL: ${BROWSER_DEFAULT_MODEL:-lmstudio/qwen3.5:9b}
      MAX_CONCURRENT: ${BROWSER_MAX_CONCURRENT:-1}
      BROWSER_HEADLESS: "true"
      LOG_LEVEL: INFO
    networks:
      - matoe-network
    shm_size: '2gb'
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  browser-2:
    image: ghcr.io/debrockb/matoe-browser:${MATOE_IMAGE_TAG:-latest}
    container_name: MATOE-Browser-2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LMSTUDIO_BASE_URL: ${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      DEFAULT_MODEL: ${BROWSER_DEFAULT_MODEL:-lmstudio/qwen3.5:9b}
      MAX_CONCURRENT: ${BROWSER_MAX_CONCURRENT:-1}
      BROWSER_HEADLESS: "true"
      LOG_LEVEL: INFO
    networks:
      - matoe-network
    shm_size: '2gb'
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  browser-3:
    image: ghcr.io/debrockb/matoe-browser:${MATOE_IMAGE_TAG:-latest}
    container_name: MATOE-Browser-3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LMSTUDIO_BASE_URL: ${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      DEFAULT_MODEL: ${BROWSER_DEFAULT_MODEL:-lmstudio/qwen3.5:9b}
      MAX_CONCURRENT: ${BROWSER_MAX_CONCURRENT:-1}
      BROWSER_HEADLESS: "true"
      LOG_LEVEL: INFO
    networks:
      - matoe-network
    shm_size: '2gb'
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  matoe-browser-lb:
    # nginx LB across browser-1/2/3. Config is baked into the browser image
    # build at /etc/nginx/nginx.conf — we mount it from a config volume populated
    # via a config file shipped in the backend image, or use the default image
    # config if you prefer. For simplicity, we use nginx:alpine with a
    # ConfigMap-style approach: the config is embedded inline below.
    image: nginx:alpine
    container_name: MATOE-Browser-LB
    configs:
      - source: browser_nginx_conf
        target: /etc/nginx/nginx.conf
    depends_on:
      - browser-1
      - browser-2
      - browser-3
    networks:
      - matoe-network
    restart: unless-stopped

  matoe-postgres:
    image: postgres:16-alpine
    container_name: MATOE-Postgres
    environment:
      POSTGRES_DB: matoe
      POSTGRES_USER: matoe_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-matoe_password}
    networks:
      - matoe-network
    volumes:
      - matoe_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matoe_user -d matoe"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  matoe-zipkin:
    image: openzipkin/zipkin-slim:3
    container_name: MATOE-Zipkin
    ports:
      - "${MATOE_ZIPKIN_PORT:-9411}:9411"
    networks:
      - matoe-network
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  matoe-redis:
    image: redis:7-alpine
    container_name: MATOE-Redis
    networks:
      - matoe-network
    volumes:
      - matoe_redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

configs:
  browser_nginx_conf:
    # Inline nginx config for the browser load-balancer. Works without a repo
    # checkout — Portainer ships this inline to /etc/nginx/nginx.conf in the LB.
    content: |
      events { worker_connections 1024; }
      http {
        upstream browser_pool {
          least_conn;
          server browser-1:8001;
          server browser-2:8001;
          server browser-3:8001;
        }
        server {
          listen 80;
          location / {
            proxy_pass http://browser_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $$host;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;
          }
        }
      }

networks:
  matoe-network:
    driver: bridge

volumes:
  matoe_app_data:
  matoe_postgres_data:
  matoe_redis_data:
