## ═══════════════════════════════════════════════════════════════════════════════
## M.A.T.O.E — NAS / Portainer Deployment
## ═══════════════════════════════════════════════════════════════════════════════
## Deploy via Portainer → Stacks → Add Stack → Repository
##   Repository URL : https://github.com/debrockb/embabel-debrock
##   Compose path   : docker-compose.portainer.yml
##   Branch         : main
##
## Required environment variables (set in Portainer Stack settings):
##   MATOE_ADMIN_TOKEN   — required for admin API write access
##
## Optional (for cloud LLMs):
##   ANTHROPIC_API_KEY, OPENROUTER_API_KEY, OPENAI_API_KEY
##
## For local LLMs on the NAS LAN:
##   LMSTUDIO_BASE_URL=http://192.168.1.100:1234/v1
##   OLLAMA_BASE_URL=http://192.168.1.100:11434
## ═══════════════════════════════════════════════════════════════════════════════

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: MATOE-Backend
    ports:
      - "8085:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://matoe-postgres:5432/matoe
      SPRING_DATASOURCE_USERNAME: matoe_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-matoe_password}
      JAVA_TOOL_OPTIONS: "-XX:+UseZGC -XX:ZCollectionInterval=120 -Xmx2G -Xms1G"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LMSTUDIO_BASE_URL: ${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      BROWSER_SERVICE_URL: http://matoe-browser-lb:80
      BROWSER_SERVICE_ENABLED: ${BROWSER_SERVICE_ENABLED:-true}
      MATOE_ADMIN_TOKEN: ${MATOE_ADMIN_TOKEN:-}
      MATOE_CORS_ORIGINS: ${MATOE_CORS_ORIGINS:-http://localhost:3080,http://localhost:80}
    depends_on:
      matoe-postgres:
        condition: service_healthy
      matoe-browser-lb:
        condition: service_started
    networks:
      - matoe-network
    volumes:
      - matoe_app_data:/app/data
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: MATOE-Frontend
    ports:
      - "3080:80"
    depends_on:
      - backend
    networks:
      - matoe-network
    restart: unless-stopped

  browser-1:
    build:
      context: ./browser_service
      dockerfile: Dockerfile
    container_name: MATOE-Browser-1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DEFAULT_MODEL: ${BROWSER_DEFAULT_MODEL:-anthropic/claude-3-5-sonnet-20241022}
      MAX_CONCURRENT: ${BROWSER_MAX_CONCURRENT:-1}
      BROWSER_HEADLESS: "true"
      LOG_LEVEL: INFO
    networks:
      - matoe-network
    shm_size: '2gb'
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  browser-2:
    build:
      context: ./browser_service
      dockerfile: Dockerfile
    container_name: MATOE-Browser-2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DEFAULT_MODEL: ${BROWSER_DEFAULT_MODEL:-anthropic/claude-3-5-sonnet-20241022}
      MAX_CONCURRENT: ${BROWSER_MAX_CONCURRENT:-1}
      BROWSER_HEADLESS: "true"
      LOG_LEVEL: INFO
    networks:
      - matoe-network
    shm_size: '2gb'
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  browser-3:
    build:
      context: ./browser_service
      dockerfile: Dockerfile
    container_name: MATOE-Browser-3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DEFAULT_MODEL: ${BROWSER_DEFAULT_MODEL:-anthropic/claude-3-5-sonnet-20241022}
      MAX_CONCURRENT: ${BROWSER_MAX_CONCURRENT:-1}
      BROWSER_HEADLESS: "true"
      LOG_LEVEL: INFO
    networks:
      - matoe-network
    shm_size: '2gb'
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  matoe-browser-lb:
    image: nginx:alpine
    container_name: MATOE-Browser-LB
    volumes:
      - ./browser_service/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - browser-1
      - browser-2
      - browser-3
    networks:
      - matoe-network
    restart: unless-stopped

  matoe-postgres:
    image: postgres:16-alpine
    container_name: MATOE-Postgres
    environment:
      POSTGRES_DB: matoe
      POSTGRES_USER: matoe_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-matoe_password}
    networks:
      - matoe-network
    volumes:
      - matoe_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matoe_user -d matoe"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  matoe-redis:
    image: redis:7-alpine
    container_name: MATOE-Redis
    networks:
      - matoe-network
    volumes:
      - matoe_redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

networks:
  matoe-network:
    driver: bridge

volumes:
  matoe_app_data:
  matoe_postgres_data:
  matoe_redis_data:
